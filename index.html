<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>میناب168</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: #faf8f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3a3a3a;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 25px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #c9a96e;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .app-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #3a3a3a;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 40px;
        }

        .loading {
            width: 50px;
            height: 50px;
            border: 3px solid #e8e0d5;
            border-top: 3px solid #c9a96e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #999;
            font-size: 0.85em;
        }

        .error-message {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            display: none;
        }

        .error-message i {
            font-size: 2em;
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-message p {
            color: #777;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .retry-btn {
            background: #c9a96e;
            color: #fff;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .retry-btn:hover {
            background: #b8924a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- لوگو -->
        <div class="logo">
            <i class="fa-regular fa-comments"></i>
        </div>

        <!-- اسم اپ -->
        <div class="app-name">میناب168</div>
        <div class="app-subtitle">پیام‌رسان اختصاصی</div>

        <!-- لودینگ -->
        <div id="loadingSection">
            <div class="loading"></div>
            <div class="loading-text">در حال بررسی تنظیمات...</div>
        </div>

        <!-- خطا -->
        <div id="errorSection" class="error-message">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>خطایی رخ داد. لطفاً دوباره تلاش کنید.</p>
            <button class="retry-btn" onclick="checkSettings()">
                <i class="fa-solid fa-rotate-right"></i> تلاش مجدد
            </button>
        </div>
    </div>

    <script>
        function checkSettings() {
            // نمایش لودینگ
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('errorSection').style.display = 'none';

            try {
                // بررسی Local Storage
                const userSettings = localStorage.getItem('minab168_user');
                
                // کمی تاخیر برای نمایش لوگو (اختیاری)
                setTimeout(() => {
                    if (userSettings) {
                        // کاربر قبلاً ثبت‌نام/ورود کرده
                        const settings = JSON.parse(userSettings);
                        if (settings.isLoggedIn && settings.userID) {
                            // هدایت به پیامرسان
                            window.location.href = 'messenger.html';
                        } else {
                            // هدایت به ویترین
                            window.location.href = 'vitrine.html';
                        }
                    } else {
                        // هیچ تنظیماتی نیست - برو به ویترین
                        window.location.href = 'vitrine.html';
                    }
                }, 1000);

            } catch (error) {
                // خطا در خوندن Local Storage
                console.error('Error:', error);
                document.getElementById('loadingSection').style.display = 'none';
                document.getElementById('errorSection').style.display = 'block';
            }
        }

        // اجرا هنگام لود صفحه
        window.onload = checkSettings;
    </script>
</body>
</html>
